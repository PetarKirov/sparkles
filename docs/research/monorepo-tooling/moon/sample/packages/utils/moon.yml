type: 'library'
language: 'typescript'

project:
  title: 'utils'
  description: 'Shared utility helpers consumed by downstream apps.'

tasks:
  build:
    command: 'tsc --build'
    inputs:
      - 'src/**/*'
      - 'tsconfig.json'
    outputs:
      - 'dist/**/*'
    options:
      cache: true
      runInCI: true
