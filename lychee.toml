# Lychee link checker configuration
# https://lychee.cli.rs/#/usage/config

#############################  Cache  ###############################

# Discard cached results older than this duration
max_cache_age = "1d"

# Don't cache transient failures (rate limits, server errors)
cache_exclude_status = [403, 429, "500.."]

#############################  Requests  ############################

# Timeout per request (seconds)
timeout = 30

# Reduce concurrent requests in CI to avoid rate limits and connection resets
max_concurrency = 16

# Maximum number of retries per request
max_retries = 2

# Wait time in seconds between retries (helps with rate-limited servers)
retry_wait_time = 2

# Resolve cross-referenced files that omit their extension
fallback_extensions = ["md", "html"]

# Skip the repo-root AGENTS.md symlink. It points at docs/guidelines/AGENTS.md
# (the canonical copy, which IS checked and passes), but its relative links are
# authored for docs/guidelines/; resolved from the repo root they yield false
# "file not found" errors. Regex-matched against the input path; anchored so it
# does not also exclude docs/guidelines/AGENTS.md.
exclude_path = ['^AGENTS\.md$']

# Don't check URLs inside code blocks (they're often illustrative, not real)
include_verbatim = false

# Don't check fragments within URLs (lychee >= 0.24 takes an enum here:
# none|anchor-only|text-only|full; "none" replaces the old boolean `false`)
include_fragments = "none"

# When a link is broken, suggest replacements from web archives
suggest = true

# Rewrite GitHub blob/tree URLs to avoid rate limits and auth issues.
# Remap only PetarKirov/sparkles links to the Contents API (where we have valid authentication token)
# Remap other public repositories' files to raw.githubusercontent.com to avoid API rate limits and 401 auth issues
remap = [
    "https://github\\.com/PetarKirov/sparkles/blob/([^/]+)/(.*) https://api.github.com/repos/PetarKirov/sparkles/contents/$2?ref=$1",
    "https://github\\.com/PetarKirov/sparkles/tree/([^/]+)/(.*) https://api.github.com/repos/PetarKirov/sparkles/contents/$2?ref=$1",
    "https://github\\.com/([^/]+)/([^/]+)/blob/([^/]+)/(.*) https://raw.githubusercontent.com/$1/$2/$3/$4",
]

#############################  Hosts  ###############################

# NOTE: per-host `[hosts."…"]` throttling is silently ignored by lychee <= 0.21
# (it only landed later — verified working on 0.24.2). Keep lychee recent or these
# blocks become no-ops.

# Throttle requests to github.com to reduce rate limiting
[hosts."github.com"]
request_interval = "1s"

[hosts."api.github.com"]
request_interval = "200ms"

[hosts."gitlab.freedesktop.org"]
request_interval = "1s"

# web.archive.org refuses *connections* (TCP-level "Connection refused", which is
# never retried) once an IP opens too many at once; it recovers in tens of seconds.
# A custom user_agent does not help — the refusal happens before any header is sent.
# Pacing requests one-at-a-time is the only fix that works. (CI excludes this host
# entirely via lychee.ci.exclude, so this throttle benefits local pre-commit runs.)
[hosts."web.archive.org"]
request_interval = "1s"
