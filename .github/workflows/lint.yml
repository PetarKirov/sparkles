name: Lint

on:
  workflow_dispatch:

  merge_group:

  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.repository }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          push-to-cache: true
          nix-github-token: ${{ github.token }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          cachix-cache: ${{ vars.CACHIX_CACHE }}
          trusted-public-keys: ${{ vars.TRUSTED_PUBLIC_KEYS }}
          substituters: ${{ vars.SUBSTITUTERS }}
          devshell: pre-commit
          use-nix-cache: true
          nix-cache-key: nix-v2-${{ runner.os }}-lint-${{ hashFiles('**/flake.lock') }}
          nix-cache-restore-prefixes: |
            nix-v2-${{ runner.os }}-lint-
            nix-v2-${{ runner.os }}-

      - name: Restore lychee cache
        uses: actions/cache/restore@v6
        with:
          path: .lycheecache
          enableCrossOsArchive: true
          key: cache-lychee-v3
          restore-keys: |
            cache-lychee-v3

      - name: Lint and check links
        run: prek run --all-files --show-diff-on-failure --color always
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SKIP: verify-md-examples

      - name: Verify markdown runnable examples
        run: |
          nix run .#ci -- --verify --files '**.md'

      # Save even when a prior step (e.g. prek) fails, so the lychee link-check
      # cache still gets populated. The combined actions/cache action gates its
      # save post-step on `post-if: success()`, which skips it on any failure;
      # the split restore/save sub-actions let us force `if: always()`.
      - name: Save lychee cache
        if: always()
        uses: actions/cache/save@v6
        with:
          path: .lycheecache
          enableCrossOsArchive: true
          key: cache-lychee-v3
