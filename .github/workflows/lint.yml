name: Lint

on:
  workflow_dispatch:

  merge_group:

  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.repository }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Nix
        uses: metacraft-labs/nixos-modules/.github/setup-nix@main
        with:
          push-to-cache: false
          nix-github-token: ${{ github.token }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          cachix-cache: ${{ vars.CACHIX_CACHE }}
          trusted-public-keys: ${{ vars.TRUSTED_PUBLIC_KEYS }}
          substituters: ${{ vars.SUBSTITUTERS }}

      - name: Cache lychee results
        uses: actions/cache@v5
        with:
          path: .lycheecache
          key: cache-lychee-v2-${{ github.sha }}
          restore-keys: cache-lychee-v2-

      - name: Lint and check links
        run: nix develop --accept-flake-config .#pre-commit -c prek run --all-files --show-diff-on-failure --color always
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SKIP: verify-md-examples

      - name: Verify markdown runnable examples
        run: |
          nix run .#ci -- --verify --files '**.md'
