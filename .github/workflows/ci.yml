name: CI

on:
  # Allow this workflow to be triggered manually:
  workflow_dispatch:

  # Allow this workflow to be run in merge queues:
  merge_group:

  # Run this workflow when PRs target `main` and when they're merged in `main`:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.repository }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            system: x86_64-linux
            DC: ldc2
          - runner: ubuntu-latest
            system: x86_64-linux
            DC: dmd
          - runner: macos-latest
            system: aarch64-darwin
            DC: ldc2
    runs-on: ${{ matrix.runner }}
    # The Linux legs finish in ~4m; the macOS leg normally runs ~5m but the
    # hosted Apple-Silicon runner intermittently hangs (a 5m job has stalled for
    # 78m). Investigation showed the build itself is cheap — a cold recompile
    # peaks at <1-2 GiB RSS with 0 swap even at 8-way `ldc2` parallelism, well
    # under the 7 GiB runner — so this is runner-side flakiness, not an OOM, and
    # it self-heals on re-run. The two `dub`-driven steps below wrap the command
    # in a per-attempt timeout + retry (`retry_on: timeout`, so a genuine test
    # failure still fails fast and is never masked). Cap the macOS job generously
    # to fit the retries; keep Linux tight where history is stable.
    timeout-minutes: ${{ matrix.runner == 'macos-latest' && 45 || 12 }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          push-to-cache: true
          cachix-cache: ${{ vars.CACHIX_CACHE }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          trusted-public-keys: ${{ vars.TRUSTED_PUBLIC_KEYS }}
          substituters: ${{ vars.SUBSTITUTERS }}
          devshell: default
          use-nix-cache: true
          nix-cache-key: nix-v2-${{ runner.os }}-${{ matrix.DC }}-${{ hashFiles('**/flake.lock') }}
          nix-cache-restore-prefixes: |
            nix-v2-${{ runner.os }}-${{ matrix.DC }}-
            nix-v2-${{ runner.os }}-

      - name: Cache DUB packages
        uses: actions/cache@v6
        with:
          path: |
            ~/.dub
            ~/.local/share/dub
          key: ${{ runner.os }}-dub-${{ hashFiles('**/dub.sdl', '**/dub.selections.json') }}
          restore-keys: |
            ${{ runner.os }}-dub-

      - name: Run flake checks
        run: nix flake check

      # Retry only on a hung attempt (`retry_on: timeout`), so a real test
      # failure fails immediately and is never masked by a re-run. `ci` and both
      # compilers are on PATH via the `default` dev shell, inherited by the
      # action's command. The per-attempt timeout is generous vs the ~5m normal
      # macOS runtime but catches an indefinite hang; a normal run still exits
      # as soon as the command finishes.
      - name: Build and test with dub
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4
        with:
          timeout_minutes: 12
          max_attempts: 3
          retry_on: timeout
          command: ci --test --fail-fast
        env:
          # `ci` embeds dmd (small closure); honour the matrix compiler for the
          # test suite so the ldc2/dmd dimensions are actually exercised. Both
          # are on PATH via the `default` dev shell.
          DC: ${{ matrix.DC }}

      - name: Build and run examples
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_on: timeout
          command: ci --example-files --fail-fast

      # OS-API research examples (docs/research/.../os-apis). These are multi-file
      # dub packages (ImportC), not single-file, so they are outside `ci
      # --example-files`; build/run the Linux ones here in the devshell. X11 opens a
      # real window under xvfb; Wayland has no compositor in CI so it prints SKIP and
      # exits 0. (macOS/iOS/Android are verified out of band — see the surveys.)
      - name: Build & run OS-API windowing examples (X11 + Wayland)
        if: runner.os == 'Linux' && matrix.DC == 'ldc2'
        run: |
          xvfb-run -a dub run --compiler=ldc2 --root=docs/research/window-system-integration/os-apis/x11/example
          dub run --compiler=ldc2 --root=docs/research/window-system-integration/os-apis/wayland/example

  # The Win32 OS-API example builds with druntime's core.sys.windows (no Nix, no
  # third-party deps), so it runs on a plain windows-latest runner via setup-dlang.
  win32-example:
    name: Win32 OS-API example (windows-latest)
    runs-on: windows-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install D (LDC)
        uses: dlang-community/setup-dlang@v2
        with:
          compiler: ldc-1.41.0

      - name: Cache DUB packages
        uses: actions/cache@v6
        with:
          path: ~/AppData/Local/dub
          key: windows-dub-osapi
          restore-keys: windows-dub-osapi

      - name: Build & run the Win32 example
        run: dub run --compiler=ldc2 --root=docs/research/window-system-integration/os-apis/win32/example

  # Build the Nix outputs and push them to the binary cache, once per system
  # (the derivations are compiler-agnostic — they always build with ldc — so
  # this is independent of the `test` job's DC matrix). `.#all` is the
  # aggregate defined in nix/packages/all.nix: the full dev shell, every
  # package, and every standalone example.
  nix-build:
    name: Nix build & push (${{ matrix.runner }})
    strategy:
      fail-fast: false
      matrix:
        runner:
          - ubuntu-latest
          - macos-latest
    runs-on: ${{ matrix.runner }}
    # `.#all` builds the whole closure; normally 2-4m from cache, but a
    # cold-cache rebuild (after a flake.lock bump) needs real margin.
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Nix
        uses: ./.github/actions/setup-nix
        with:
          push-to-cache: true
          cachix-cache: ${{ vars.CACHIX_CACHE }}
          cachix-auth-token: ${{ secrets.CACHIX_AUTH_TOKEN }}
          trusted-public-keys: ${{ vars.TRUSTED_PUBLIC_KEYS }}
          substituters: ${{ vars.SUBSTITUTERS }}
          use-nix-cache: true
          nix-cache-key: nix-${{ runner.os }}-nixbuild-${{ hashFiles('**/flake.lock') }}
          nix-cache-restore-prefixes: |
            nix-${{ runner.os }}-nixbuild-
            nix-${{ runner.os }}-

      # Built paths are pushed to the cache by the setup-nix action
      # (push-to-cache: true).
      - name: Build & push devShells.full, all packages, and all examples
        run: nix build --print-build-logs .#all

      - name: Run all runnable examples
        run: nix run .#run-all-examples
